name: genAndReleas.yaml

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Protobuf
        uses: bufbuild/buf-setup-action@v1.50.0

      - name: Install go buf Modules (if SDK changes)
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.29.0
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.2.0

      - name: Get Previous Tag
        id: get-previous-tag
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          previous_tag="$(gh release list --limit 1 | awk '{ print $1 }')"
          if [ -z "$previous_tag" ]; then
            echo "ℹ️ **No previous releases found.** This will be the first release." >> $GITHUB_STEP_SUMMARY
            previous_tag="0.0.0.0"
          else
            echo "🏷️ **Previous release tag:** \`${previous_tag}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "previous_tag=$previous_tag" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Calculate New Version
        id: calculate-version
        shell: bash
        run: |
          # Get previous tag value from previous step
          previous_tag="${{ steps.get-previous-tag.outputs.previous_tag }}"

          # Get current YYYY.MM.DD
          today="$(date +'%Y').$(date +'%m').$(date +'%d')"

          # Extract year, month and patch from previous tag
          if [[ "$previous_tag" =~ ^([0-9]{4})\.([0-9]{2})\.([0-9]{2})\.([0-9]{1,2}) ]]; then
            py="${BASH_REMATCH[1]}"
            pm="${BASH_REMATCH[2]}"
            pd="${BASH_REMATCH[3]}"
            pp="${BASH_REMATCH[4]:-0}"
            # normalize Day to two digits for consistent comparison
            pm=$(printf "%02d" "$pm")
            pd=$(printf "%02d" "$pd")
            previous_date="${py}.${pm}.${pd}"
            previous_patch="$pp"
          fi

          echo "### Version Components" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Previous Value | New Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Year      | ${previous_year} | $(date +'%Y') |" >> $GITHUB_STEP_SUMMARY
          echo "| Month     | ${previous_month} | $(date +'%-m') |" >> $GITHUB_STEP_SUMMARY
          echo "| Day       | ${previous_day} | $(date +'%-d') |" >> $GITHUB_STEP_SUMMARY
          echo ""${previous_date}" == "${today}"" >> $GITHUB_STEP_SUMMARY

          if [[ "${previous_date}" == "${today}" ]]; then
              next_patch="$((previous_patch + 1))"
              echo "| Patch     | ${previous_patch} | ${next_patch} ⬆️ |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "ℹ️ Month release already exists for this year → **incrementing patch number by 1**" >> $GITHUB_STEP_SUMMARY
          else
              next_patch="0"
              echo "| Patch     | ${previous_patch} | ${next_patch} 🔄 |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "ℹ️ First release for this day → **resetting patch number to 0**" >> $GITHUB_STEP_SUMMARY
          fi

          release_tag="${today}.${next_patch}"
          echo "release_tag=$release_tag" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 **New release tag:** \`${release_tag}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Buf Generate (if SDK changes)
        run: |
          buf generate

      - name: Create Release Branch, Commit, Tag and Push
        run: |
          CURRENT_BRANCH=$(git branch --show-current); 
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/${{ steps.calculate-version.outputs.release_tag }}"
          git add gen/
          git commit -m "Release ${{ steps.calculate-version.outputs.release_tag }}: Include generated client libraries"
          git tag -a ${{ steps.calculate-version.outputs.release_tag }} -m "Release ${{ steps.calculate-version.outputs.release_tag }}"
          git checkout $CURRENT_BRANCH
          git branch -D release/${{ steps.calculate-version.outputs.release_tag }}
          git push origin ${{ steps.calculate-version.outputs.release_tag }}
          git push origin :release/${{ steps.calculate-version.outputs.release_tag }}