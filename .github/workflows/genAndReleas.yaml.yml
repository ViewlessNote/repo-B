name: release-workflow.yaml

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1.50.0

      - name: Get Previous Tag
        id: get-previous-tag
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          previous_tag="$(gh release list --limit 1 --json tagName -q '.[0].tagName')"
          if [ -z "$previous_tag" ]; then
            echo "ℹ️ **No previous releases found.**" >> $GITHUB_STEP_SUMMARY
            previous_tag="0.0.0"
          else
            echo "🏷️ **Previous release tag:** \`${previous_tag}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "previous_tag=$previous_tag" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Calculate New Version
        id: calculate-version
        shell: bash
        run: |
          # Get previous tag value from previous step
          previous_tag="${{ steps.get-previous-tag.outputs.previous_tag }}"

          # Use semver to calculate the next version
          # Use the git Commit message feat! feat, and fix to determine the type of release
          # If the commit message contains "feat!" or "fix!", it indicates a breaking change, and we should increment the major version.
          # If the commit message contains "feat", it indicates a new feature, and we should increment the minor version.
          # If the commit message contains "fix", it indicates a bug fix, and we should increment the patch version.
            # Get the commit messages since the last tag
            commit_messages=$(git log --pretty=format:"%s")
            echo "📋 **Commit messages since last release:**" >> $GITHUB_STEP_SUMMARY
            echo "```\n$commit_messages\n```" >> $GITHUB_STEP_SUMMARY
            if echo "$commit_messages" | grep -qE "feat!|fix!"; then
              new_version=$(semver bump major "$previous_tag")
              release_type="major"
            elif echo "$commit_messages" | grep -q "feat"; then
              new_version=$(semver bump minor "$previous_tag")
              release_type="minor"
            elif echo "$commit_messages" | grep -q "fix"; then
              new_version=$(semver bump patch "$previous_tag")
              release_type="patch"
            else
              echo "⚠️ **No relevant commit messages found. No new release will be created.**" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi

      - name: Buf Generate
        run: |
          buf generate

      - name: Create Release Branch, Commit, Tag, and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_BRANCH=$(git branch --show-current)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/${{ steps.calculate-version.outputs.release_tag }}"
          git add gen/
          git commit -m "Release ${{ steps.calculate-version.outputs.release_tag }}: Include generated client libraries"
          git tag -a ${{ steps.calculate-version.outputs.release_tag }} -m "Release ${{ steps.calculate-version.outputs.release_tag }}"
          git checkout "$CURRENT_BRANCH"
          git branch -D "release/${{ steps.calculate-version.outputs.release_tag }}"
          git push origin ${{ steps.calculate-version.outputs.release_tag }}
          gh release create ${{ steps.calculate-version.outputs.release_tag }} \
              --repo ${{github.repository}} \
              --title "${{ steps.calculate-version.outputs.release_tag }}" \
              --generate-notes