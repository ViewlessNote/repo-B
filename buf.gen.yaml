version: v2
clean: true
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: gen/go
    opt: paths=source_relative
  - remote: buf.build/grpc/php:v1.67.0
    out: gen/php
  - remote: buf.build/protocolbuffers/php:v28.2
    out: gen/php
  - remote: buf.build/bufbuild/es:v2.2.2
    out: gen/ts